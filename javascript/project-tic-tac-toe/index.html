<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <container>
        <header>
            <h1>Tic Tac Toe</h1>
            <button type="button" class="reload"></button>
        </header>
        <div class="gameBoard">
        </div>
        <div class="gameStart">
            <input type="text" id="PlayerX" placeholder="Player X">
            <input type="text" id="PlayerO" placeholder="Player O">

            <button type="button" id="start" onclick="Game.startGame()">Start</button>
            <button type="button" id="reset" onclick="Game.resetGame()">Reset</button>

        </div>
        <footer>
            <p>JuananGlez</p>
        </footer>
    </container>
    <script src="tic-tac-toe.js"></script>
</body>

</html>
